<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔔 Gym Platform - Socket.io Test</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
    h1 { color: #38bdf8; margin-bottom: 20px; }
    h2 { color: #94a3b8; margin-bottom: 10px; font-size: 16px; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 14px; }
    button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: bold; margin-right: 10px; margin-bottom: 10px; }
    .btn-blue { background: #3b82f6; color: white; }
    .btn-green { background: #22c55e; color: white; }
    .btn-red { background: #ef4444; color: white; }
    .btn-yellow { background: #eab308; color: black; }
    .status { padding: 8px 16px; border-radius: 20px; display: inline-block; font-size: 13px; margin-bottom: 10px; }
    .status.connected { background: #166534; color: #86efac; }
    .status.disconnected { background: #7f1d1d; color: #fca5a5; }
    .notification { background: #1e3a5f; border-left: 4px solid #38bdf8; padding: 12px; border-radius: 8px; margin-bottom: 10px; animation: fadeIn 0.3s ease; }
    .notification .title { font-weight: bold; color: #38bdf8; margin-bottom: 4px; }
    .notification .message { font-size: 13px; color: #94a3b8; }
    .notification .time { font-size: 11px; color: #475569; margin-top: 4px; }
    .log { background: #0f172a; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 12px; font-family: monospace; }
    .log.success { color: #86efac; }
    .log.error { color: #fca5a5; }
    .log.info { color: #93c5fd; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    #notif-count { background: #ef4444; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; margin-left: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏋️ Gym Platform — Socket.io Test</h1>

    <!-- CONNECTION -->
    <div class="card">
      <h2>1. Connect to Socket.io</h2>
      <input type="text" id="token" placeholder="Paste your JWT access token here..." />
      <button class="btn-blue" onclick="connect()">🔌 Connect</button>
      <button class="btn-red" onclick="disconnect()">❌ Disconnect</button>
      <br>
      <span id="status" class="status disconnected">⚫ Disconnected</span>
    </div>

    <!-- NOTIFICATIONS -->
    <div class="card">
      <h2>2. Notifications <span id="notif-count" style="display:none">0</span></h2>
      <button class="btn-yellow" onclick="clearNotifications()">🗑️ Clear</button>
      <div id="notifications">
        <p style="color:#475569; font-size:13px">No notifications yet — waiting for real-time events...</p>
      </div>
    </div>

    <!-- LOGS -->
    <div class="card">
      <h2>3. Console Logs</h2>
      <button class="btn-red" onclick="clearLogs()">🗑️ Clear Logs</button>
      <div id="logs"></div>
    </div>
  </div>

  <script>
    let socket = null;
    let notifCount = 0;

    function log(message, type = 'info') {
      const logs = document.getElementById('logs');
      const time = new Date().toLocaleTimeString();
      logs.innerHTML = `<div class="log ${type}">[${time}] ${message}</div>` + logs.innerHTML;
    }

    function connect() {
      const token = document.getElementById('token').value.trim();
      if (!token) { log('❌ Please paste your JWT token first!', 'error'); return; }

      if (socket) socket.disconnect();

      socket = io('http://localhost:5000', {
        auth: { token }
      });

      socket.on('connect', () => {
        document.getElementById('status').className = 'status connected';
        document.getElementById('status').textContent = '🟢 Connected — ' + socket.id;
        log('✅ Connected to Socket.io server!', 'success');
      });

      socket.on('disconnect', () => {
        document.getElementById('status').className = 'status disconnected';
        document.getElementById('status').textContent = '⚫ Disconnected';
        log('❌ Disconnected from server', 'error');
      });

      socket.on('connect_error', (err) => {
        log('❌ Connection error: ' + err.message, 'error');
      });

      // 🔔 LISTEN FOR NOTIFICATIONS
      socket.on('notification', (data) => {
        log('🔔 New notification received: ' + data.title, 'success');
        addNotification(data);
      });
    }

    function disconnect() {
      if (socket) {
        socket.disconnect();
        socket = null;
      }
    }

    function addNotification(data) {
      notifCount++;
      const countEl = document.getElementById('notif-count');
      countEl.style.display = 'inline';
      countEl.textContent = notifCount;

      const container = document.getElementById('notifications');
      const time = new Date().toLocaleTimeString();
      container.innerHTML = `
        <div class="notification">
          <div class="title">🔔 ${data.title}</div>
          <div class="message">${data.message}</div>
          <div class="time">${time}</div>
        </div>
      ` + container.innerHTML;
    }

    function clearNotifications() {
      document.getElementById('notifications').innerHTML = '<p style="color:#475569; font-size:13px">Cleared!</p>';
      notifCount = 0;
      document.getElementById('notif-count').style.display = 'none';
    }

    function clearLogs() {
      document.getElementById('logs').innerHTML = '';
    }
  </script>
</body>
</html>
